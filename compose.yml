services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-property_ai_poc}
      POSTGRES_USER: ${POSTGRES_USER:-property_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-property_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-property_user} -d ${POSTGRES_DB:-property_ai_poc}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-property_user}:${POSTGRES_PASSWORD:-property_password}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-property_ai_poc}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_storage:/app/storage
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # Uncomment after adding certificates and enabling the TLS server block
      # in docker/nginx.conf.
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./docker/auth:/etc/nginx/auth:ro
      - ./docker/error-pages:/usr/share/nginx/error-pages:ro

volumes:
  postgres_data:
  api_storage:
