<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRAY WORKS</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #18201f;
        background: #f7f2e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(17, 96, 90, 0.14), transparent 34%),
          linear-gradient(315deg, rgba(234, 111, 83, 0.16), transparent 38%),
          #f7f2e8;
      }

      main {
        width: min(560px, calc(100% - 32px));
        border: 1px solid rgba(24, 32, 31, 0.13);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.9);
        padding: 34px;
        box-shadow: 0 26px 80px rgba(24, 32, 31, 0.12);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #11605a;
        font-size: 0.82rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        color: #4f5d59;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        color: #11605a;
        font-weight: 800;
      }

      .status {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 999px;
        background: rgba(234, 111, 83, 0.13);
        padding: 9px 12px;
        color: #9c3d28;
        font-size: 0.84rem;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Access restricted</p>
      <h1>GRAY WORKS</h1>
      <p>
        This demo is currently private. To request access or schedule a walkthrough,
        please reach out to
        <a href="mailto:garytannjy@gmail.com">garytannjy@gmail.com</a>.
      </p>
      <div class="status">403 Forbidden</div>
    </main>
  </body>
</html>
